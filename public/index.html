<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>WSF | Unblock Games + Proxy</title>
		<meta
			name="description"
			content="WSF is an unblock game hub with an Ultraviolet-powered web proxy and adjustable side settings panel."
		/>
		<meta
			name="keywords"
			content="wsf, unblock games, game proxy, ultraviolet proxy, web proxy, browser games"
		/>
		<meta
			name="theme-color"
			media="(prefers-color-scheme: dark)"
			content="#111827"
		/>
		<link rel="shortcut icon" content="favicon.ico" />
		<link rel="stylesheet" href="index.css" />

		<script src="baremux/index.js"></script>
		<script src="uv/uv.bundle.js"></script>
		<script src="uv/uv.config.js"></script>
	</head>

	<body>
		<div class="app-layout">
			<aside class="sidebar">
				<h1>WSF</h1>
				<p>Unblock game portal + proxy launcher.</p>

				<form id="uv-form" class="proxy-form">
					<input
						id="uv-search-engine"
						value="https://duckduckgo.com/?q=%s"
						type="hidden"
					/>
					<input
						id="uv-address"
						type="text"
						placeholder="Search or enter URL"
						autocomplete="off"
					/>
					<button type="submit">Launch Proxy</button>
				</form>

				<div class="settings">
					<h2>Settings</h2>
					<label>
						<span>Theme</span>
						<select id="theme-select">
							<option value="dark">Dark</option>
							<option value="midnight">Midnight Blue</option>
							<option value="light">Light</option>
						</select>
					</label>
					<label>
						<span>Search Engine</span>
						<select id="engine-select">
							<option value="https://duckduckgo.com/?q=%s">DuckDuckGo</option>
							<option value="https://www.google.com/search?q=%s">Google</option>
							<option value="https://www.bing.com/search?q=%s">Bing</option>
						</select>
					</label>
				</div>

				<p id="uv-error"></p>
				<pre id="uv-error-code"></pre>
			</aside>

			<main class="content">
				<header>
					<h2>Featured Unblock Games</h2>
					<p>Click any game to open through the WSF proxy.</p>
				</header>
				<section class="game-grid" id="game-grid">
					<button class="game-card" data-url="https://1v1.lol">1v1.LOL</button>
					<button class="game-card" data-url="https://krunker.io">
						Krunker
					</button>
					<button class="game-card" data-url="https://shellshock.io">
						Shell Shockers
					</button>
					<button class="game-card" data-url="https://eaglercraft.com">
						Eaglercraft
					</button>
					<button class="game-card" data-url="https://slopegame.com">
						Slope
					</button>
					<button class="game-card" data-url="https://agar.io">Agar.io</button>
				</section>
				<iframe id="uv-frame" title="WSF proxy frame"></iframe>
			</main>
		</div>

		<script src="register-sw.js"></script>
		<script src="search.js"></script>
		<script src="index.js"></script>
	</body>
</html>
